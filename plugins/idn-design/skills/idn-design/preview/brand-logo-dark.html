<!doctype html>
<!-- @dsCard group="Brand" name="Logo — Dark" subtitle="Reversed lockup on navy" viewport="700x205" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .stage { background: var(--gradient-ink); border: 1px solid var(--slate); border-radius: var(--r-md); padding: 30px 32px; display:flex; align-items:center; justify-content:space-between; gap: 24px; position:relative; overflow:hidden; }
  .stage::after { content:""; position:absolute; top:-50%; right:-5%; width:260px; height:200px; background: radial-gradient(closest-side, rgba(46,139,208,0.28), transparent 70%); }
  .stage img { height: 46px; display:block; position:relative; }
  .meta { text-align: right; position:relative; }
  .meta .t { font-family: var(--font-slab); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--mist); line-height: 1.7; }
  .meta .t b { color: var(--idn-sky-300); }
  .rule { font-size: 11px; color: var(--gray); margin: 12px 0 0; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Brand · Logo — dark backgrounds</p>
  <div class="stage">
    <img src="../assets/idn-logo-dark.png" alt="Innovative Dynamic Networks (reversed)">
    <div class="meta"><div class="t"><b>Reversed lockup</b><br>White text · blue mark<br>Use on navy / ink / photos</div></div>
  </div>
  <p class="rule">The reversed file keeps the blue mark and switches text to white. Use on Ink, Slate, or dark imagery only.</p>
</div></body></html>
