<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing Scale" subtitle="4px base unit, tokens 1–9" viewport="700x300" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display: flex; flex-direction: column; gap: 8px; }
  .r { display: flex; align-items: center; gap: 14px; }
  .bar { height: 16px; background: var(--idn-sky); border-radius: 3px; }
  .tk { font-family: var(--font-slab); font-size: 11px; color: var(--ink); width: 70px; flex: none; font-weight: 700; }
  .vl { font-family: var(--font-slab); font-size: 11px; color: var(--gray); width: 46px; flex:none; }
  .use { font-size: 11px; color: var(--gray); }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Spacing — 4px base unit</p>
  <div class="scale">
    <div class="r"><span class="tk">space-1</span><span class="vl">4px</span><div class="bar" style="width:4px"></div><span class="use">icon nudge</span></div>
    <div class="r"><span class="tk">space-2</span><span class="vl">8px</span><div class="bar" style="width:8px"></div><span class="use">chip padding</span></div>
    <div class="r"><span class="tk">space-3</span><span class="vl">12px</span><div class="bar" style="width:12px"></div><span class="use">inline gaps</span></div>
    <div class="r"><span class="tk">space-4</span><span class="vl">16px</span><div class="bar" style="width:16px"></div><span class="use">card padding</span></div>
    <div class="r"><span class="tk">space-5</span><span class="vl">24px</span><div class="bar" style="width:24px"></div><span class="use">card gaps</span></div>
    <div class="r"><span class="tk">space-6</span><span class="vl">32px</span><div class="bar" style="width:32px"></div><span class="use">gutters</span></div>
    <div class="r"><span class="tk">space-7</span><span class="vl">48px</span><div class="bar" style="width:48px"></div><span class="use">section pad (UI)</span></div>
    <div class="r"><span class="tk">space-8</span><span class="vl">64px</span><div class="bar" style="width:64px"></div><span class="use">section pad</span></div>
    <div class="r"><span class="tk">space-9</span><span class="vl">96px</span><div class="bar" style="width:96px"></div><span class="use">hero spacing</span></div>
  </div>
</div></body></html>
