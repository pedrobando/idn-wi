<!doctype html>
<!-- @dsCard group="Type" name="Slab — Roboto Slab" subtitle="Overlines & numeric proof-points" viewport="700x175" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start; }
  .block .lab { font-family: var(--font-slab); font-size: 9.5px; letter-spacing: .08em; text-transform: uppercase; color: var(--gray); margin: 0 0 12px; }
  .over { font-family: var(--font-slab); font-size: 11px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--idn-blue); }
  .over.sky { color: var(--idn-sky-700); }
  .over.slate { color: var(--slate); }
  .stack { display: flex; flex-direction: column; gap: 10px; }
  .stats { display: flex; gap: 26px; }
  .stat b { font-family: var(--font-slab); font-weight: 700; font-size: 34px; color: var(--idn-blue); line-height: 1; font-variant-numeric: tabular-nums; letter-spacing: -0.01em; display:block; }
  .stat span { font-family: var(--font-slab); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--gray); margin-top: 6px; display:block; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Type · Slab — overlines & numerics (Roboto Slab)</p>
  <div class="grid">
    <div class="block">
      <p class="lab">Overlines · eyebrows</p>
      <div class="stack">
        <span class="over">MANAGED IT</span>
        <span class="over sky">VETERAN-OWNED</span>
        <span class="over slate">CERTIFIED · RELIABLE</span>
      </div>
    </div>
    <div class="block">
      <p class="lab">Numeric proof-points</p>
      <div class="stats">
        <div class="stat"><b>1,000+</b><span>Clients</span></div>
        <div class="stat"><b>10-min</b><span>Response SLA</span></div>
        <div class="stat"><b>35+</b><span>Yrs exp.</span></div>
      </div>
    </div>
  </div>
</div></body></html>
