<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals" subtitle="Warm-cool grays, ink & cloud — each swatch ringed for clarity" viewport="700x165" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--cloud); }
  .card { background: #fff; }
  .swatches { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border-strong); border-radius: var(--r-sm); overflow: hidden; background: #fff; box-shadow: var(--shadow-xs); }
  .sw .fill { height: 60px; box-shadow: inset 0 0 0 1px rgba(19,41,58,.10); }
  .sw .meta { padding: 8px 9px 10px; }
  .sw .nm { font-size: 11px; font-weight: 700; color: var(--ink); display: block; }
  .sw .hx { font-family: var(--font-slab); font-size: 9.5px; color: var(--gray); display: block; margin-top: 2px; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Neutrals — warm-cool, never flat IT gray</p>
  <div class="swatches">
    <div class="sw"><div class="fill" style="background:#13293A"></div><div class="meta"><span class="nm">Ink</span><span class="hx">#13293A</span></div></div>
    <div class="sw"><div class="fill" style="background:#223645"></div><div class="meta"><span class="nm">Slate</span><span class="hx">#223645</span></div></div>
    <div class="sw"><div class="fill" style="background:#5E6B73"></div><div class="meta"><span class="nm">Gray</span><span class="hx">#5E6B73</span></div></div>
    <div class="sw"><div class="fill" style="background:#B5C5D0"></div><div class="meta"><span class="nm">Mist</span><span class="hx">#B5C5D0</span></div></div>
    <div class="sw"><div class="fill" style="background:#E4E9ED"></div><div class="meta"><span class="nm">Line</span><span class="hx">#E4E9ED</span></div></div>
    <div class="sw"><div class="fill" style="background:#F4F7F9"></div><div class="meta"><span class="nm">Cloud</span><span class="hx">#F4F7F9</span></div></div>
    <div class="sw"><div class="fill" style="background:#FFFFFF"></div><div class="meta"><span class="nm">White</span><span class="hx">#FFFFFF</span></div></div>
  </div>
</div></body></html>
