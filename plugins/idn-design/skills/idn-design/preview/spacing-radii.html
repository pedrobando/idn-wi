<!doctype html>
<!-- @dsCard group="Spacing" name="Corner Radii" subtitle="4 → 999px, soft not pill-ish" viewport="700x185" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: flex; gap: 16px; align-items: flex-end; }
  .item { text-align: center; }
  .box { width: 96px; height: 70px; background: var(--idn-blue-100); border: 1.5px solid var(--idn-blue); }
  .nm { font-size: 12px; font-weight: 700; color: var(--ink); margin-top: 10px; }
  .vl { font-family: var(--font-slab); font-size: 10.5px; color: var(--gray); margin-top: 2px; }
  .use { font-size: 10.5px; color: var(--gray); margin-top: 2px; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Radii — soft, not pill-ish</p>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="nm">xs</div><div class="vl">4px</div></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="nm">sm</div><div class="vl">6px</div><div class="use">buttons · inputs</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="nm">md</div><div class="vl">10px</div><div class="use">cards · panels</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="nm">lg</div><div class="vl">16px</div><div class="use">feature · modal</div></div>
    <div class="item"><div class="box" style="border-radius:999px;width:70px"></div><div class="nm">pill</div><div class="vl">999px</div><div class="use">badges · avatar</div></div>
  </div>
</div></body></html>
