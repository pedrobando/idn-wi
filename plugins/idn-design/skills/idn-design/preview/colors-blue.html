<!doctype html>
<!-- @dsCard group="Colors" name="Blue Family" subtitle="Primary brand blue scale (from the mark)" viewport="700x190" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatches { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border: 1px solid var(--line); border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-xs); }
  .sw .fill { height: 92px; display: flex; align-items: flex-end; padding: 10px; }
  .sw .fill span { font-family: var(--font-slab); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; }
  .sw .meta { padding: 10px 12px 12px; }
  .sw .nm { font-size: 13px; font-weight: 700; color: var(--ink); display: block; }
  .sw .hx { font-family: var(--font-slab); font-size: 11px; color: var(--gray); display: block; margin-top: 2px; }
  .sw .use { font-size: 11px; color: var(--gray); display: block; margin-top: 6px; line-height: 1.4; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Brand · Blue family</p>
  <div class="swatches">
    <div class="sw"><div class="fill" style="background:#2E8BD0;color:#fff"><span>300</span></div><div class="meta"><span class="nm">Signal Blue</span><span class="hx">#2E8BD0</span><span class="use">Bright highlight · the mark's energy</span></div></div>
    <div class="sw"><div class="fill" style="background:#1567A8;color:#fff"><span>500 · Primary</span></div><div class="meta"><span class="nm">IDN Blue</span><span class="hx">#1567A8</span><span class="use">Primary action · links · key data</span></div></div>
    <div class="sw"><div class="fill" style="background:#0E4E82;color:#fff"><span>700</span></div><div class="meta"><span class="nm">Deep Blue</span><span class="hx">#0E4E82</span><span class="use">Hover · pressed · gradient depth</span></div></div>
    <div class="sw"><div class="fill" style="background:#E7F1F9;color:#0E4E82;border-bottom:1px solid var(--line)"><span>100</span></div><div class="meta"><span class="nm">Blue Tint</span><span class="hx">#E7F1F9</span><span class="use">Soft fills · selected rows</span></div></div>
  </div>
</div></body></html>
