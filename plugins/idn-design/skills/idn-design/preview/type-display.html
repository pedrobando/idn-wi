<!doctype html>
<!-- @dsCard group="Type" name="Display — Cabin" subtitle="Display specimen + weights" viewport="700x250" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .disp { font-family: var(--font-display); font-weight: 700; font-size: 50px; line-height: 1.02; letter-spacing: -0.025em; color: var(--ink); margin: 6px 0 4px; }
  .disp .pri { color: var(--idn-blue); }
  .meta { font-family: var(--font-slab); font-size: 10.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--gray); }
  .weights { display: flex; gap: 28px; margin-top: 22px; align-items:flex-end; }
  .weights div { text-align: center; }
  .weights .g { font-size: 38px; color: var(--ink); line-height: 1; }
  .weights .l { font-family: var(--font-slab); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; color: var(--gray); margin-top: 8px; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Type · Display — Cabin</p>
  <div class="disp">Managed IT,<br><span class="pri">simplified.</span></div>
  <span class="meta">Cabin Bold · 50px · tracking −0.025em</span>
  <div class="weights">
    <div><div class="g" style="font-weight:400">Aa</div><div class="l">Regular 400</div></div>
    <div><div class="g" style="font-weight:500">Aa</div><div class="l">Medium 500</div></div>
    <div><div class="g" style="font-weight:600">Aa</div><div class="l">SemiBold 600</div></div>
    <div><div class="g" style="font-weight:700">Aa</div><div class="l">Bold 700</div></div>
  </div>
</div></body></html>
