<!doctype html>
<!-- @dsCard group="Brand" name="Logo — Light" subtitle="Primary lockup on light" viewport="700x195" -->
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .stage { background: #fff; border: 1px solid var(--line); border-radius: var(--r-md); padding: 30px 32px; display:flex; align-items:center; justify-content:space-between; gap: 24px; }
  .stage img { height: 46px; display:block; }
  .meta { text-align: right; }
  .meta .t { font-family: var(--font-slab); font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--gray); line-height: 1.7; }
  .meta .t b { color: var(--idn-blue); }
  .rule { font-size: 11px; color: var(--gray); margin: 12px 0 0; }
</style></head>
<body><div class="card">
  <p class="card-eyebrow">Brand · Logo — light backgrounds</p>
  <div class="stage">
    <img src="../assets/idn-logo.png" alt="Innovative Dynamic Networks">
    <div class="meta"><div class="t"><b>Primary lockup</b><br>Black text · blue mark<br>Min height 28px · clear space = mark width</div></div>
  </div>
  <p class="rule">Never alter, recolor, stretch, or add effects to the logo. Use on white or light cloud surfaces.</p>
</div></body></html>
