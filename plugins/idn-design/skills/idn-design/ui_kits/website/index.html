<!doctype html>
<!-- @dsCard group="UI Kit — Website" name="Website UI Kit" subtitle="Interactive marketing site — hero, services, founder story, lead modal" viewport="1280x800" -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Innovative Dynamic Networks — Managed IT in Racine, WI</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="kit.css" />
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Nav.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Services.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="AssessmentModal.jsx"></script>
<script type="text/babel" src="Pages.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [page, setPage] = React.useState("home");
  const [modal, setModal] = React.useState(false);
  const [menu, setMenu] = React.useState(false);
  const onAssess = () => setModal(true);

  React.useEffect(() => { window.scrollTo(0, 0); }, [page]);
  React.useEffect(() => { if (window.lucide) window.lucide.createIcons({ attrs: {} }); });

  return (
    <React.Fragment>
      <TopBar />
      <Nav page={page} setPage={setPage} onAssess={onAssess} onMenu={() => setMenu(true)} />
      <MobileMenu open={menu} setOpen={setMenu} setPage={setPage} onAssess={onAssess} />

      {page === "home" && (
        <main>
          <Hero onAssess={onAssess} setPage={setPage} />
          <ClientStrip />
          <ProofBand />
          <ServicesSection setPage={setPage} limit={6} />
          <WhyIDN onAssess={onAssess} />
          <Founder />
          <Testimonial />
          <CTABand onAssess={onAssess} />
        </main>
      )}
      {page === "services" && <main><ServicesPage onAssess={onAssess} setPage={setPage} /></main>}
      {page === "contact" && <main><ContactPage onAssess={onAssess} /></main>}

      <Footer setPage={setPage} />
      <AssessmentModal open={modal} onClose={() => setModal(false)} />
    </React.Fragment>
  );
}

let __rendered = false;
const waitForComponents = () => {
  if (__rendered) return;
  if (window.TopBar && window.Hero && window.Footer && window.AssessmentModal && window.ServicesPage) {
    __rendered = true;
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  } else {
    setTimeout(waitForComponents, 30);
  }
};
waitForComponents();
</script>
</body>
</html>
